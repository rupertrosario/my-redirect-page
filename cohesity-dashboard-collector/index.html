<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cohesity Fleet Overview</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#687386;--blue:#1769e0;--green:#159447;--amber:#d98700;--red:#cf3030;--line:#dce3ee}
*{box-sizing:border-box}body{margin:0;font:14px Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{padding:20px 26px 10px}h1{margin:0 0 4px;font-size:24px}.sub{color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px 26px}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px #15223b0d}
.kpi{padding:16px}.kpi strong{display:block;font-size:27px;margin-top:7px}.layout{display:grid;grid-template-columns:minmax(560px,1.6fr) minmax(330px,1fr);gap:16px;padding:0 26px 26px}
.panel{overflow:hidden}.panel-title{padding:15px 17px;border-bottom:1px solid var(--line);font-weight:650}
table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:12px;text-transform:uppercase}
tbody tr{cursor:pointer}tbody tr:hover,tbody tr.selected{background:#edf4ff}.badge{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:650}.good{background:#dcf6e6;color:#087735}.warn{background:#fff0cf;color:#9b5b00}.bad{background:#ffe1e1;color:#a01818}.neutral{background:#edf0f5;color:#536071}
.detail{padding:18px}.detail h2{margin:0 0 15px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{border:1px solid var(--line);border-radius:8px;padding:12px}.metric span{display:block;color:var(--muted);font-size:12px}.metric strong{display:block;font-size:19px;margin-top:6px}
button{width:100%;margin-top:16px;padding:11px;border:0;border-radius:7px;background:var(--blue);color:#fff;font-weight:650;cursor:pointer}
.error{margin:0 26px 14px;padding:10px 13px;background:#fff0cf;color:#815000;border-radius:7px;display:none}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}}@media(max-width:520px){.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Cohesity Fleet Overview</h1><div class="sub" id="generated">Loading current dashboard data…</div></header>
<div id="error" class="error"></div>
<section class="kpis">
<div class="card kpi">Total Clusters<strong id="total">—</strong></div>
<div class="card kpi">Healthy<strong id="healthy">—</strong></div>
<div class="card kpi">Warnings<strong id="warnings">—</strong></div>
<div class="card kpi">Critical Alerts<strong id="critical">—</strong></div>
</section>
<main class="layout">
<section class="panel"><div class="panel-title">Clusters</div><div style="overflow:auto"><table><thead><tr><th>Cluster</th><th>Location</th><th>Version</th><th>Health</th><th>Capacity</th></tr></thead><tbody id="rows"></tbody></table></div></section>
<aside class="panel"><div class="panel-title">Selected Cluster</div><div class="detail" id="detail">Select a cluster.</div></aside>
</main>
<script>
let model;
const fmtBytes=n=>{if(!Number.isFinite(n)||n<=0)return '—';const u=['B','KB','MB','GB','TB','PB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(i>3?1:0)+' '+u[i]};
const clsHealth=s=>/healthy|good|green/i.test(s)?'good':/warn|yellow|degrad/i.test(s)?'warn':/critical|red|bad/i.test(s)?'bad':'neutral';
const val=(v,s='—')=>v===null||v===undefined||v===''?s:v;
function showDetail(c){
 document.querySelectorAll('#rows tr').forEach(r=>r.classList.toggle('selected',r.dataset.id===c.id));
 const cap=c.capacity||{};
 document.getElementById('detail').innerHTML='<h2>'+val(c.name)+'</h2><div class="grid">'+
 metric('Version',val(c.version)) + metric('Health',val(c.health))+
 metric('Capacity Used',cap.usedPercent==null?'—':cap.usedPercent+'%')+
 metric('Capacity',fmtBytes(cap.usedBytes)+' / '+fmtBytes(cap.totalBytes))+
 metric('Protected Sources',val(c.protectedSources,0))+
 metric((model.lookbackDays||7)+'-Day Success',c.backupSuccess7dPercent==null?'—':c.backupSuccess7dPercent+'%')+
 metric('Active Policies',val(c.activePolicies,0))+metric('Open Alerts',val(c.openAlerts,0))+
 '</div><button id="snow">Raise SNOW Ticket</button>';
 document.getElementById('snow').onclick=()=>{const payload={cluster:c.name,clusterId:c.id,health:c.health,openAlerts:c.openAlerts,generatedAtUtc:model.generatedAtUtc};navigator.clipboard?.writeText(JSON.stringify(payload,null,2));alert('Incident details copied. Connect this button to your approved ServiceNow/Dynatrace endpoint before production use.');};
}
function metric(k,v){return '<div class="metric"><span>'+k+'</span><strong>'+v+'</strong></div>'}
function render(m){model=m;const s=m.summary||{};total.textContent=val(s.totalClusters,0);healthy.textContent=val(s.healthyClusters,0);warnings.textContent=val(s.warningClusters,0);critical.textContent=val(s.criticalAlerts,0);generated.textContent='Generated '+new Date(m.generatedAtUtc).toLocaleString();
 rows.innerHTML='';(m.clusters||[]).forEach((c,i)=>{const tr=document.createElement('tr');tr.dataset.id=c.id;tr.innerHTML='<td><strong>'+val(c.name)+'</strong></td><td>'+val(c.location)+'</td><td><span class="badge '+(c.versionStatus==='BelowBaseline'?'warn':'neutral')+'">'+val(c.version)+'</span></td><td><span class="badge '+clsHealth(c.health)+'">'+val(c.health)+'</span></td><td>'+(c.capacity?.usedPercent==null?'—':c.capacity.usedPercent+'%')+'</td>';tr.onclick=()=>showDetail(c);rows.appendChild(tr);if(i===0)showDetail(c)});
}
fetch('output/dashboard.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw Error(r.status+' '+r.statusText);return r.json()}).then(render).catch(e=>{error.style.display='block';error.textContent='Dashboard data could not be loaded: '+e.message+'. Run Run-CohesityDashboard.ps1 first.'});
</script>
</body></html>
